<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>LofiAt</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script src="main.js" defer></script>
        <script src="timer.js" defer></script>
        <script src="iframeVideos.js" defer></script>
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.1/css/all.css" integrity="sha384-vp86vTRFVJgpjF9jiIGPEEqYqlDwgyBgEF109VFjmqGmIY/Y4HV4d3Gp2irVfcrp" crossorigin="anonymous">
        <link rel="stylesheet" href="baseStyle.css">
        <link rel="icon" href="loveworld.png">
    </head>
    <body>
        <div id="sideBar">
            <div class="topSegment">
                <div class="backButton"><a href="spacesPlus.html" class="goingtoHome" target="_blank"><i class="fas fa-arrow-left"></i>  LofiAt</a></div>
                <div class="socialLinks">
                    <a href="https://www.instagram.com/adrian.td" class="fab fa-instagram" target="_blank"></a>
                    <a href="https://www.tiktok.com/@adrian.td_?lang=en" class="fab fa-tiktok" target="_blank"></a>
                    <a href="https://twitter.com/AdrianTobi1" class="fab fa-twitter" target="_blank"></a>
                    <a href="https://discord.gg/7pdSvsUtfx" class="fab fa-discord" target="_blank"></a>
                </div>
            </div>

            <div class="spacesControls">
                <div class="shuffleTitle">
                    <p>Shuffle your space</p>
                    <div class="scrollButtons">
                        <button id="left" onclick="moveLeft()"><i class="fas fa-chevron-left"></i></button>
                        <button id="right" onclick="moveRight()"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
    
                <div id="selectSpaceWrapper">
                    <div id="selectSpace">
                        <div id="row">
                            <a class="button-wrapper" data-tooltip="Beach" currentitem="false">
                                <button class="locationButton" onclick="beach(); vidTitle()">🏝️</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="Mountain" currentitem="false">
                                <button class="locationButton" onclick="mountain(); vidTitle()">⛰️</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="Snow" currentitem="false">
                                <button class="locationButton" onclick="snow(); vidTitle()">❄️</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="Coffee/Cafe" currentitem="false">
                                <button class="locationButton" onclick="cafe(); vidTitle()">☕</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="Fantasy" currentitem="false">
                                <button class="locationButton" onclick="fantasy(); vidTitle()">🦉</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="Windows" currentitem="false">
                                <button class="locationButton" onclick="windows(); vidTitle()">🪟</button>
                            </a>
                        </div>
                        <div id="row">
                            <a class="button-wrapper" data-tooltip="Celebrity" currentitem="false">
                                <button class="locationButton" onclick="studyWithMe(); vidTitle()">🎟️</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="Study with me" currentitem="false">
                                <button class="locationButton" onclick="studyWithMe(); vidTitle()">👩‍💻</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="City" currentitem="false">
                                <button class="locationButton" onclick="studyWithMe(); vidTitle()">🌃</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="Walking Tour" currentitem="false">
                                <button class="locationButton" onclick="studyWithMe(); vidTitle()">🚶‍♂️</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="Suprise" currentitem="false">
                                <button class="locationButton" onclick="studyWithMe(); vidTitle()">🤫</button>
                            </a>
                            <a class="button-wrapper" data-tooltip="Anime" currentitem="false">
                                <button class="locationButton" onclick="anime(); vidTitle()">👾</button>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="place">
                        <div id="placeName">Study with KharmaMedic</div>
                        <button class="likeSpace"><i class="far fa-heart"></i></button>
                    </div>
                    <div class="playlist">
                        <i class="fas fa-tasks"></i>
                    </div>
                </div>

                <div class="volumeControl">
                    <i class="fas fa-volume-down"></i>
                    <div class="sliderContainer">
                        <input type="range" min="0" max="100" value="0" class="slider" id="volume" oninput="document.getElementById('theValue').innerHTML = this.value / 100">
                        <div id ="theValue">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="timerSection">
            <div class="timeSegment">
                <div class="startTime"><span id="time">25:00</span></div>
                <div class="breakTime"><span id="waitTime">05:00</span></div>
                <div class="bigBreak"><span id="longWait">15:00</span></div>
                <button id="start" onclick="change(); nameChange(); timeBegins()" value="Start">Start</button>
            </div>
            <div class="timeMenu">
                <button id="lofi" onclick="lofi()">Lofi</button>
                <button id="shortBreak" onclick="shortBreak()">Short Break</button>
                <button id="longBreak" onclick="longBreak()">Long Break</button>
            </div>
        </div>

        <div class="sideButton">
            <button id="opened" onclick="swap(); showOrHide();"><i class="fas fa-chevron-left"></i></button>
            <button id="closed" onclick="swap(); showOrHide();"><i class="fas fa-chevron-right"></i></button>
        </div>
        
        <div class="virtualSpaces">
            <div class="embed">
                <iframe id="video" src="https://www.youtube.com/embed/fJP7c8xt1n4?rel=0&autoplay=1&modestbranding=1&autohide=1&showinfo=0&controls=0&showsearch=0&iv_load_policy=3&enablejsapi=1&disablekb=0&loop=1&mute=1" title="Study with KharmaMedic"></iframe>
            </div>
        </div>
    </body>
</html>
